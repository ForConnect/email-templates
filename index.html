<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Templates — ForConnect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e14;
    --surface: #111620;
    --surface2: #181e2a;
    --border: #1e2535;
    --border2: #2a3347;
    --text: #e8edf5;
    --muted: #5a6580;
    --muted2: #8a96b0;
    --cyan: #00e5c8;
    --cyan-dim: rgba(0,229,200,0.12);
    --cyan-border: rgba(0,229,200,0.3);
    --sans: 'Inter', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 1rem;
  }

  .container {
    max-width: 660px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted2);
  }

  header h1 span {
    color: var(--cyan);
  }

  .field {
    margin-bottom: 1.5rem;
  }

  .field label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    padding: 11px 16px;
    font-family: var(--sans);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: var(--cyan-border);
    box-shadow: 0 0 0 3px rgba(0,229,200,0.06);
  }

  .field input::placeholder {
    color: var(--muted);
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 9px 6px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    border: none;
    background: transparent;
    color: var(--muted2);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--cyan-dim);
    color: var(--cyan);
    border: 1px solid var(--cyan-border);
  }

  .tab:hover:not(.active) {
    color: var(--text);
    background: var(--surface2);
  }

  .subject-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 12px;
  }

  .subject-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }

  .subject-text {
    font-size: 13px;
    color: var(--muted2);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .copy-subj {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 5px 12px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted2);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .copy-subj:hover { border-color: var(--cyan-border); color: var(--cyan); }
  .copy-subj.done { border-color: var(--cyan-border); color: var(--cyan); background: var(--cyan-dim); }

  .preview {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 1.5rem;
    font-size: 13.5px;
    line-height: 1.85;
    color: var(--muted2);
    white-space: pre-wrap;
    font-family: var(--sans);
    min-height: 260px;
    margin-bottom: 1rem;
  }

  .copy-body {
    width: 100%;
    padding: 13px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--cyan);
    color: #050a0e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-body:hover { background: #00ccb4; }
  .copy-body:active { transform: scale(0.99); }
  .copy-body.done { background: #00b89f; }

  .follow-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    background: rgba(255,180,0,0.1);
    color: #ffb400;
    border: 1px solid rgba(255,180,0,0.25);
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }

  footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-dot"></div>
    <h1>AI Telefoonassistent &nbsp;·&nbsp; <span>Email Templates</span></h1>
  </header>

  <div class="field">
    <label>Naam / Praktijk</label>
    <input type="text" id="nameInput" placeholder="bijv. Jan de Vries" oninput="render()" />
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab(0)">Solo</button>
    <button class="tab" onclick="setTab(1)">2–3 personen</button>
    <button class="tab" onclick="setTab(2)">Team (3+)</button>
    <button class="tab" onclick="setTab(3)">Follow-up NEW</button>
    <button class="tab" onclick="setTab(4)">Follow-up OLD</button>
  </div>

  <div class="subject-row">
    <span class="subject-label">Subject</span>
    <span class="subject-text" id="subjText"></span>
    <button class="copy-subj" id="copySubj" onclick="copySubj()">Kopieer</button>
  </div>

  <div class="preview" id="preview"></div>

  <button class="copy-body" id="copyBody" onclick="copyBody()">Kopieer volledige e-mail</button>

  <footer>forconnect.nl &nbsp;·&nbsp; AI Telefoonassistent</footer>
</div>

<script>
const templates = [
  {
    subject: "Korte vraag over uw bereikbaarheid",
    body: n => `Beste ${n},

Wat gebeurt er met iemand die belt — voor een afspraak, wijziging of annulering — op het moment dat u in behandeling bent?
Die beller hangt op — en u weet niet wie het was, of wat de reden was.

Wij ontwikkelden een telefonische AI-assistent die precies op dat moment overneemt. Zij spreekt natuurlijk Nederlands, beantwoordt vragen en noteert naam, nummer en reden van contact — waarna u alles overzichtelijk ontvangt via e-mail.

Zo is er altijd iemand bereikbaar, zonder dat u extra personeel nodig heeft.

Steeds meer praktijken werken al met onze telefonische assistent. De investering per maand is vergelijkbaar met één behandeling.

Wilt u de agent zelf even testen?`
  },
  {
    subject: "Korte vraag over uw bereikbaarheid",
    body: n => `Beste ${n},

Wat gebeurt er met iemand die belt — voor een afspraak, wijziging of annulering — op het moment dat jullie allebei in behandeling zijn?
Die beller hangt op — en jullie weten niet wie het was, of wat de reden was.

Wij ontwikkelden een telefonische AI-assistent die precies op dat moment overneemt. Zij noteert naam, nummer en reden van contact, waarna jullie alles overzichtelijk ontvangen.

Zo is er altijd iemand bereikbaar, zonder extra personeel.

Steeds meer praktijken werken al met onze telefonische assistent. De investering is vergelijkbaar met één behandeling.

Wilt u de agent zelf even testen?`
  },
  {
    subject: "Korte vraag over uw bereikbaarheid",
    body: n => `Beste ${n},

Wat gebeurt er met iemand die belt — voor een afspraak, wijziging of annulering — op het moment dat iedereen in behandeling is?
Die beller hangt op — en u weet niet wie het was, of wat de reden was.

Met meerdere therapeuten tegelijk blijft de telefoon vaker onbeantwoord dan gedacht.

Wij ontwikkelden een telefonische AI-assistent die precies op dat moment overneemt en elke oproep vastlegt.

Zo is er altijd iemand bereikbaar, zonder extra personeel.

Meerdere praktijken werken al met onze oplossing. De investering per maand is vergelijkbaar met één à twee behandelingen.

Wilt u de agent zelf even testen?`
  },
  {
    subject: "Nog even over mijn vorige bericht",
    body: n => `Beste ${n},

Ik wilde mijn vorige bericht nog even kort onder de aandacht brengen.

Wat gebeurt er met iemand die belt terwijl u in behandeling bent?
Die beller hangt op — en u weet niet wie het was.

Steeds meer praktijken werken daarom met onze telefonische assistent die op dat moment overneemt.

Wilt u dat ik u een kort demo nummer stuur zodat u het zelf kunt testen?`
  },
  {
    subject: "Nog even over mijn vorige bericht",
    body: n => `Beste ${n},

Ik wilde nog even kort opvolgen op mijn vorige bericht.

Wat gebeurt er met iemand die belt terwijl u in behandeling bent?
In veel gevallen: die hangt op — en u weet niet wie het was.

Dat is precies het moment waar onze telefonische assistent voor bedoeld is.

Wilt u dat ik u een kort demo nummer stuur zodat u het zelf kunt ervaren?`
  }
];

let current = 0;

function setTab(i) {
  current = i;
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', i === j));
  render();
}

function getName() {
  const v = document.getElementById('nameInput').value.trim();
  return v || '[Naam]';
}

function render() {
  const t = templates[current];
  document.getElementById('subjText').textContent = t.subject;
  document.getElementById('preview').textContent = t.body(getName());
  const cb = document.getElementById('copyBody');
  cb.textContent = 'Kopieer volledige e-mail';
  cb.classList.remove('done');
  const cs = document.getElementById('copySubj');
  cs.textContent = 'Kopieer';
  cs.classList.remove('done');
}

function copyBody() {
  navigator.clipboard.writeText(templates[current].body(getName())).then(() => {
    const btn = document.getElementById('copyBody');
    btn.textContent = 'Gekopieerd ✓';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Kopieer volledige e-mail'; btn.classList.remove('done'); }, 2000);
  });
}

function copySubj() {
  navigator.clipboard.writeText(templates[current].subject).then(() => {
    const btn = document.getElementById('copySubj');
    btn.textContent = 'Gekopieerd ✓';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Kopieer'; btn.classList.remove('done'); }, 2000);
  });
}

render();
</script>
</body>
</html>
